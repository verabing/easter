<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Easter Nuts</title>
  <meta name="description" content="A small Easter calendar with five eggs in a basket and an art gallery below." />
  <link rel="icon" href="favicon.ico" />
  <style>
    :root {
      --bg: #f3f3f3;
      --text: #4b4038;
      --muted: #7a6c62;
      --accent: #e6a03c;
      --panel: rgba(255, 255, 255, 0.68);
      --line: rgba(113, 88, 63, 0.16);
      --shadow: 0 12px 28px rgba(83, 61, 42, 0.10);
      --basket-1: #a5794a;
      --basket-2: #7b5736;
      --straw-1: #ccb36b;
      --straw-2: #e1ca8e;
      --gallery-bg: rgba(255,255,255,0.74);
      --egg1a: #2f88a7;
      --egg1b: #f2c75f;
      --egg2a: #c28a2c;
      --egg2b: #296d7e;
      --egg3a: #5cc7d8;
      --egg3b: #e78345;
      --egg4a: #1f6f8d;
      --egg4b: #f0c34e;
      --egg5a: #3d91b6;
      --egg5b: #8fcf7d;
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      width: min(1160px, calc(100% - 28px));
      margin: 0 auto;
      padding: 46px 0 56px;
    }

    .intro {
      text-align: center;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1;
      color: var(--accent);
      font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      max-width: 760px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .basket-stage {
      position: relative;
      max-width: 760px;
      margin: 0 auto 34px;
      min-height: 410px;
    }

    .basket-wrap {
      position: relative;
      width: min(560px, 100%);
      margin: 0 auto;
      height: 390px;
    }

    .basket-handle {
      position: absolute;
      left: 50%;
      top: 12px;
      transform: translateX(-50%);
      width: 360px;
      height: 188px;
      border: 13px solid rgba(138, 103, 69, 0.72);
      border-bottom: 0;
      border-radius: 220px 220px 0 0;
      z-index: 1;
    }

    .basket-back {
      position: absolute;
      left: 50%;
      bottom: 84px;
      transform: translateX(-50%);
      width: 420px;
      height: 64px;
      border-radius: 999px;
      background: rgba(96, 72, 44, 0.12);
      filter: blur(2px);
      z-index: 1;
    }

    .straw {
      position: absolute;
      left: 50%;
      bottom: 102px;
      transform: translateX(-50%);
      width: 440px;
      height: 74px;
      background:
        repeating-linear-gradient(25deg, transparent 0 10px, rgba(255,255,255,0.15) 10px 14px, transparent 14px 23px),
        repeating-linear-gradient(120deg, transparent 0 11px, var(--straw-1) 11px 14px, transparent 14px 24px),
        repeating-linear-gradient(70deg, transparent 0 10px, var(--straw-2) 10px 13px, transparent 13px 23px);
      border-radius: 50% 50% 40% 40% / 48% 48% 52% 52%;
      opacity: 0.95;
      z-index: 2;
    }

    .basket {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 500px;
      height: 190px;
      border-radius: 34% 34% 20% 20% / 54% 54% 20% 20%;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.16) 0 12px, rgba(0,0,0,0.03) 12px 22px, rgba(255,255,255,0.10) 22px 32px),
        linear-gradient(180deg, #b98a59 0%, var(--basket-1) 54%, var(--basket-2) 100%);
      box-shadow: inset 0 10px 16px rgba(255,255,255,0.18), inset 0 -14px 18px rgba(56, 36, 21, 0.18), 0 16px 26px rgba(79, 56, 35, 0.16);
      z-index: 3;
    }

    .basket::before {
      content: "";
      position: absolute;
      inset: 18px 24px auto;
      height: 26px;
      border-radius: 999px;
      background: rgba(80, 54, 31, 0.16);
    }

    .egg-layer {
      position: absolute;
      inset: 0;
      z-index: 4;
    }

    .egg {
      position: absolute;
      width: 92px;
      height: 124px;
      border: 0;
      padding: 0;
      cursor: pointer;
      background: transparent;
      transition: transform 0.18s ease, opacity 0.18s ease, filter 0.18s ease;
    }

    .egg:hover:not([disabled]) {
      transform: translateY(-4px) rotate(var(--tilt));
      filter: saturate(1.08);
    }

    .egg[disabled] {
      cursor: not-allowed;
      filter: saturate(0.88) brightness(0.98);
    }

    .egg.opened {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-16px) scale(0.88);
    }

    .shell {
      position: absolute;
      inset: 0;
      border-radius: 50% 50% 48% 48% / 60% 60% 40% 40%;
      box-shadow: inset 0 8px 12px rgba(255,255,255,0.24), inset 0 -10px 12px rgba(73,43,20,0.12), 0 8px 16px rgba(82,57,38,0.15);
      border: 2px solid rgba(89,62,42,0.08);
      overflow: hidden;
    }

    .shell::before,
    .shell::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
    }

    .egg-1 .shell {
      background:
        radial-gradient(circle at 72% 24%, rgba(255,255,255,0.35) 0 9px, transparent 10px),
        repeating-linear-gradient(140deg, transparent 0 12px, rgba(255,255,255,0.34) 12px 18px, transparent 18px 30px),
        linear-gradient(180deg, var(--egg1a), var(--egg1b));
    }
    .egg-1 .shell::after {
      background: radial-gradient(circle at 30% 55%, rgba(255,255,255,0.25) 0 12px, transparent 13px);
    }

    .egg-2 .shell {
      background:
        radial-gradient(circle, rgba(255,255,255,0.35) 0 7px, transparent 8px) 14px 18px / 28px 28px,
        linear-gradient(180deg, var(--egg2a), var(--egg2b));
    }
    .egg-2 .shell::after {
      background: repeating-linear-gradient(90deg, transparent 0 14px, rgba(255,255,255,0.18) 14px 18px, transparent 18px 30px);
    }

    .egg-3 .shell {
      background:
        repeating-radial-gradient(circle at 54% 35%, rgba(255,255,255,0.38) 0 5px, transparent 5px 17px),
        linear-gradient(180deg, var(--egg3a), var(--egg3b));
    }
    .egg-3 .shell::after {
      background: linear-gradient(90deg, transparent 0 16%, rgba(255,255,255,0.24) 16% 24%, transparent 24% 36%, rgba(255,255,255,0.24) 36% 42%, transparent 42% 100%);
    }

    .egg-4 .shell {
      background:
        repeating-linear-gradient(-35deg, transparent 0 14px, rgba(255,255,255,0.30) 14px 18px, transparent 18px 32px),
        linear-gradient(180deg, var(--egg4a), var(--egg4b));
    }
    .egg-4 .shell::after {
      background: radial-gradient(circle at 28% 62%, rgba(255,255,255,0.22) 0 11px, transparent 12px);
    }

    .egg-5 .shell {
      background:
        linear-gradient(90deg, transparent 0 10%, rgba(255,255,255,0.26) 10% 14%, transparent 14% 24%, rgba(255,255,255,0.26) 24% 28%, transparent 28% 100%),
        linear-gradient(180deg, var(--egg5a), var(--egg5b));
    }
    .egg-5 .shell::after {
      background: radial-gradient(circle at 70% 30%, rgba(255,255,255,0.26) 0 10px, transparent 11px);
    }

    .egg-label {
      position: absolute;
      inset: 42px 0 auto;
      text-align: center;
      color: rgba(70, 53, 40, 0.86);
      font-size: 1.6rem;
      font-weight: 700;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    }

    .egg[data-pos="1"] { left: 96px; top: 150px; --tilt: -8deg; }
    .egg[data-pos="2"] { left: 180px; top: 122px; --tilt: -4deg; }
    .egg[data-pos="3"] { left: 266px; top: 136px; --tilt: 1deg; }
    .egg[data-pos="4"] { left: 352px; top: 126px; --tilt: 4deg; }
    .egg[data-pos="5"] { left: 432px; top: 158px; --tilt: 8deg; }

    .gallery {
      max-width: 1220px;
      margin: 0 auto;
      background: var(--gallery-bg);
      border: 4px solid var(--accent);
      border-radius: 10px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
    }

    .gallery-card {
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(113, 88, 63, 0.12);
      border-radius: 4px;
      padding: 10px;
      box-shadow: 0 8px 16px rgba(83, 61, 42, 0.06);
      cursor: pointer;
    }

    .gallery-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #faf7f2;
    }

    .gallery-empty {
      min-height: 130px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
      padding: 12px;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(32, 24, 18, 0.56);
      z-index: 20;
    }

    .modal.open { display: flex; }

    .modal-card {
      width: min(860px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: rgba(255,255,255,0.96);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 16px 34px rgba(52, 39, 28, 0.22);
    }

    .modal-card h2 {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: clamp(1.7rem, 4vw, 2.4rem);
    }

    .modal-date,
    .modal-text {
      color: var(--muted);
      line-height: 1.6;
    }

    .modal-image {
      width: 100%;
      max-height: 68vh;
      object-fit: contain;
      display: block;
      margin: 16px 0 12px;
      background: #faf7f2;
      border-radius: 8px;
    }

    .close-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .basket-stage {
        min-height: 340px;
      }

      .basket-wrap {
        width: min(520px, 100%);
        height: 320px;
      }

      .basket-handle {
        width: 290px;
        height: 150px;
        top: 8px;
      }

      .basket-back { width: 360px; bottom: 72px; }
      .straw { width: 380px; bottom: 88px; }
      .basket { width: 430px; height: 166px; }

      .egg { width: 76px; height: 104px; }
      .egg-label { inset: 34px 0 auto; font-size: 1.35rem; }
      .egg[data-pos="1"] { left: 82px; top: 124px; }
      .egg[data-pos="2"] { left: 150px; top: 98px; }
      .egg[data-pos="3"] { left: 218px; top: 114px; }
      .egg[data-pos="4"] { left: 288px; top: 100px; }
      .egg[data-pos="5"] { left: 358px; top: 130px; }

      .gallery-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .wrap {
        width: min(100% - 18px, 1160px);
        padding-top: 28px;
      }

      h1 { font-size: 2.2rem; }
      .subtitle { font-size: 0.98rem; }

      .basket-stage {
        min-height: 250px;
        margin-bottom: 24px;
      }

      .basket-wrap {
        width: 100%;
        height: 240px;
      }

      .basket-handle {
        width: 170px;
        height: 92px;
        border-width: 8px;
        top: 10px;
      }

      .basket-back {
        width: 196px;
        height: 34px;
        bottom: 54px;
      }

      .straw {
        width: 218px;
        height: 38px;
        bottom: 62px;
      }

      .basket {
        width: 250px;
        height: 96px;
      }

      .basket::before {
        inset: 10px 12px auto;
        height: 14px;
      }

      .egg {
        width: 44px;
        height: 62px;
      }

      .egg-label {
        inset: 19px 0 auto;
        font-size: 0.92rem;
      }

      .egg[data-pos="1"] { left: calc(50% - 88px); top: 100px; }
      .egg[data-pos="2"] { left: calc(50% - 48px); top: 84px; }
      .egg[data-pos="3"] { left: calc(50% - 6px); top: 92px; }
      .egg[data-pos="4"] { left: calc(50% + 34px); top: 84px; }
      .egg[data-pos="5"] { left: calc(50% + 76px); top: 102px; }

      .gallery {
        padding: 10px;
      }

      .gallery-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="intro">
      <h1>Easter Nuts</h1>
      <p class="subtitle">Five decorated eggs sit in the basket. One egg unlocks each day from Maundy Thursday through Easter Monday. When you open an egg, it disappears from the basket and a new artwork is added to the gallery below.</p>
    </section>

    <section class="basket-stage" aria-label="Easter basket with five eggs">
      <div class="basket-wrap">
        <div class="basket-handle" aria-hidden="true"></div>
        <div class="basket-back" aria-hidden="true"></div>
        <div class="straw" aria-hidden="true"></div>
        <div class="basket" aria-hidden="true"></div>
        <div class="egg-layer" id="eggLayer"></div>
      </div>
    </section>

    <section class="gallery" aria-live="polite">
      <div class="gallery-empty" id="galleryEmpty">No egg has been opened yet.</div>
      <div class="gallery-grid" id="galleryGrid"></div>
    </section>
  </main>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <h2 id="modalTitle"></h2>
      <div class="modal-date" id="modalDate"></div>
      <img class="modal-image" id="modalImage" src="" alt="" />
      <p class="modal-text" id="modalText"></p>
      <button class="close-btn" id="closeBtn" type="button">Close</button>
    </div>
  </div>

  <script>
    const items = [
      {
        id: 1,
        title: 'Maundy Thursday',
        date: '2026-04-02',
        image: 'bilder/artwork-1.svg',
        text: 'Replace this placeholder with your first Easter artwork.'
      },
      {
        id: 2,
        title: 'Good Friday',
        date: '2026-04-03',
        image: 'bilder/artwork-2.svg',
        text: 'Replace this placeholder with your second Easter artwork.'
      },
      {
        id: 3,
        title: 'Holy Saturday',
        date: '2026-04-04',
        image: 'bilder/artwork-3.svg',
        text: 'Replace this placeholder with your third Easter artwork.'
      },
      {
        id: 4,
        title: 'Easter Sunday',
        date: '2026-04-05',
        image: 'bilder/artwork-4.svg',
        text: 'Replace this placeholder with your fourth Easter artwork.'
      },
      {
        id: 5,
        title: 'Easter Monday',
        date: '2026-04-06',
        image: 'bilder/artwork-5.svg',
        text: 'Replace this placeholder with your fifth Easter artwork.'
      }
    ];

    const storagePrefix = 'easterBasketGallery_';

    const eggLayer = document.getElementById('eggLayer');
    const galleryGrid = document.getElementById('galleryGrid');
    const galleryEmpty = document.getElementById('galleryEmpty');
    const modal = document.getElementById('modal');
    const modalTitle = document.getElementById('modalTitle');
    const modalDate = document.getElementById('modalDate');
    const modalImage = document.getElementById('modalImage');
    const modalText = document.getElementById('modalText');
    const closeBtn = document.getElementById('closeBtn');

    function formatDate(dateString) {
      const date = new Date(dateString + 'T12:00:00');
      return new Intl.DateTimeFormat('en-GB', {
        weekday: 'long',
        day: 'numeric',
        month: 'long'
      }).format(date);
    }

    function isUnlocked(dateString) {
      const today = new Date();
      const current = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
      const targetDate = new Date(dateString + 'T00:00:00');
      const target = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate()).getTime();
      return current >= target;
    }

    function isOpened(id) {
      return localStorage.getItem(storagePrefix + id) === '1';
    }

    function markOpened(id) {
      localStorage.setItem(storagePrefix + id, '1');
    }

    function openModal(item) {
      modalTitle.textContent = item.title;
      modalDate.textContent = formatDate(item.date);
      modalText.textContent = item.text;
      modalImage.src = item.image;
      modalImage.alt = item.title;
      modal.classList.add('open');
    }

    function renderEggs() {
      eggLayer.innerHTML = '';

      items.forEach((item, index) => {
        const button = document.createElement('button');
        const unlocked = isUnlocked(item.date);
        const opened = isOpened(item.id);
        button.type = 'button';
        button.className = `egg egg-${item.id}${opened ? ' opened' : ''}`;
        button.dataset.pos = String(index + 1);
        button.disabled = !unlocked || opened;
        button.setAttribute('aria-label', `${item.title}${opened ? ', opened' : unlocked ? ', open egg' : ', locked'}`);
        button.innerHTML = '<span class="shell"></span><span class="egg-label">' + item.id + '</span>';
        button.addEventListener('click', () => {
          if (!unlocked || opened) return;
          markOpened(item.id);
          render();
          openModal(item);
        });
        eggLayer.appendChild(button);
      });
    }

    function renderGallery() {
      galleryGrid.innerHTML = '';
      const openedItems = items.filter(item => isOpened(item.id));
      galleryEmpty.style.display = openedItems.length ? 'none' : 'grid';

      openedItems.forEach(item => {
        const card = document.createElement('article');
        card.className = 'gallery-card';
        card.innerHTML = `<img src="${item.image}" alt="${item.title}">`;
        card.addEventListener('click', () => openModal(item));
        galleryGrid.appendChild(card);
      });
    }

    function render() {
      renderEggs();
      renderGallery();
    }

    closeBtn.addEventListener('click', () => modal.classList.remove('open'));
    modal.addEventListener('click', event => {
      if (event.target === modal) modal.classList.remove('open');
    });

    render();
  </script>
</body>
</html>
